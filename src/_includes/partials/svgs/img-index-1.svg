<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1300" id="animation-about">

<style>
#index-nuclear {
animation: index-nuclear-pulse 4.8s ease-in-out infinite;
opacity: .55; }

@keyframes index-nuclear-pulse {
0%, 100% {
opacity: .4; }

50% {
opacity: .75; } }

@media (prefers-reduced-motion: reduce) {
#index-nuclear {
animation: none;
opacity: .55; } }
</style>

